<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mummu Live2D Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:sans-serif; }

/* 버튼 */
.btn-action {
    width:100%;
    padding:18px;
    background:black;
    color:white;
    border:none;
    font-weight:800;
    border-radius:12px;
    cursor:pointer;
}

/* 팝업 */
#contactModal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    z-index:9999;
}

.modal-content {
    width:90%;
    max-width:900px;
    height:80%;
    margin:5% auto;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    position:relative;
}

.close-btn {
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    cursor:pointer;
    color:#000;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div style="max-width:800px; margin:100px auto; text-align:center;">
    <h1>견적 테스트 페이지</h1>
    <p>버튼 누르면 아트머그 문의창 팝업</p>

    <button class="btn-action" onclick="openContact()">문의하기</button>
</div>

<!-- 팝업 -->
<div id="contactModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeContact()">&times;</span>
        <iframe id="contactFrame"></iframe>
    </div>
</div>

<script>
function openContact() {
    const url = "https://artmug.kr/index.php?channel=view&uid=54344";
    document.getElementById("contactFrame").src = url;
    document.getElementById("contactModal").style.display = "block";
}

function closeContact() {
    document.getElementById("contactModal").style.display = "none";
    document.getElementById("contactFrame").src = "";
}
</script>

</body>
</html>
}
</script>
